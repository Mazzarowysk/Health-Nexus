<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Nexus — Sistema de Gestão Hospitalar</title>
  <!-- Favicon / Ícone do Sistema -->
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <!-- Fontes Corporativas: Outfit (títulos) e Inter (corpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Ícones Modernos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js para Gráficos Interativos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Bibliotecas para Exportação (Relatórios) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Estilos Globais e Design System -->
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <!-- Tela de Inicialização / Carregamento com Logomarca -->
    <div class="initial-loader">
      <img src="/assets/logo.png" alt="Health Nexus" class="loader-logo">
      <div class="loader-spinner"></div>
      <p class="loader-text">Inicializando o Sistema...</p>
    </div>
  </div>
  <!-- Script de Entrada SPA -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
